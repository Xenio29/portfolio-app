<div class="carousel">
	<app-carousel-cards
		[title]="'Time Lord'"
		[description]="`Un jeu vidéo développé sur Unity en vue 3e personne, mettant en place un système de pouvoirs temporels innovant. Exploration des mécaniques de gameplay avec des interactions environnementales avancées.`"
		[number]="'01'"
		[imageClass]="'p1'"
		[imageSrc]="'projets/time-lord.png'"
		[imageAlt]="'Time Lord game project'"
	/>
	<app-carousel-cards
		[title]="'Jeu de voiture'"
		[description]="`Projet de jeu de course développé sur Unity avec implémentation de la physique réelle. Gestion des forces, frictions et collisions pour une expérience de conduite réaliste et immersive.`"
		[number]="'02'"
		[imageClass]="'p2'"
		[imageSrc]="'projets/voiture.png'"
		[imageAlt]="'Jeu de voiture project'"
	/>
	<app-carousel-cards
		[title]="'Robot Sumo'"
		[description]="`Robot de combat programmé en Arduino utilisant C++ et Scratch. Conception d'algorithmes d'IA pour la détection d'adversaires et la stratégie de combat en arène.`"
		[number]="'03'"
		[imageClass]="'p3'"
		[imageSrc]="'projets/robot-sumo.png'"
		[imageAlt]="'Robot Sumo project'"
	/>
	<app-carousel-cards
		[title]="'Robot Ménager'"
		[description]="`Robot mobile programmé en Arduino C++, capable de se déplacer autonomément dans la salle de cours tout en détectant et en évitant les obstacles grâce à des capteurs sophistiqués.`"
		[number]="'04'"
		[imageClass]="'p4'"
		[imageSrc]="'projets/robot-menager.png'"
		[imageAlt]="'Robot Menager project'"
	/>
	<app-carousel-cards
		[title]="'Robot de Course'"
		[description]="`Robot autonome programmé en Arduino C++, accomplissant un parcours prédéfini et complexe grâce à un système de capteurs RGB avancés et une navigation précise.`"
		[number]="'05'"
		[imageClass]="'p5'"
		[imageSrc]="'projets/robot-course.png'"
		[imageAlt]="'Robot de course project'"
	/>
	<app-carousel-cards
		[title]="'Meal Planner'"
		[description]="`Application développée en Python avec interface HTML-CSS permettant la planification hebdomadaire de repas équilibrés. Calcul automatique des besoins nutritionnels et suggestions adaptées.`"
		[number]="'06'"
		[imageClass]="'p6'"
		[imageSrc]="'projets/meal-planner.png'"
		[imageAlt]="'Meal Planner project'"
	/>
	<app-carousel-cards
		[title]="'Système de Cryptage'"
		[description]="`Application Python de sécurisation de messages utilisant les codes ASCII et le chiffrement César. Algorithmes robustes pour l'encodage et décodage sécurisé de données sensibles.`"
		[number]="'07'"
		[imageClass]="'p7'"
		[imageSrc]="'projets/cryptage.png'"
		[imageAlt]="'Systeme de cryptage project'"
	/>
	<app-carousel-cards
		[title]="'Home Control Panel'"
		[description]="`Système domotique programmé sur Raspberry Pi Pico assurant le contrôle intelligent de la température ambiante et du chauffage avec automatisation et monitoring en temps réel.`"
		[number]="'08'"
		[imageClass]="'p8'"
		[imageSrc]="'projets/home-control-panel.png'"
		[imageAlt]="'Home Control Panel project'"
	/>
	<app-carousel-cards
		[title]="'Effet Doppler par Ultrason'"
		[description]="`Projet Arduino avancé utilisant un module ultrason pour mesurer l'effet Doppler. Calculs mathématiques précis pour estimer la vitesse de mouvement d'objets en déplacement.`"
		[number]="'09'"
		[imageClass]="'p9'"
		[imageSrc]="'projets/effet-doppler.png'"
		[imageAlt]="'Effet Doppler par Ultrason project'"
	/>
	<app-carousel-cards
		[title]="'Radar Routier'"
		[description]="`Radar routier artisanal développé avec Arduino UNO en C++. Construction en acrylique avec intégration de capteurs pour la mesure de vitesse et la détection de véhicules.`"
		[number]="'10'"
		[imageClass]="'p10'"
		[imageSrc]="'projets/radar-routier.png'"
		[imageAlt]="'Radar Routier project'"
	/>
</div>
